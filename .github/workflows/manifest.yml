name: Genereaza manifest media

# Ruleaza cand se schimba ceva in media/ SAU scriptul.
# Ignora manifest.json ca sa nu se declanseze singur la propriul commit.
on:
  push:
    paths:
      - 'media/**'
      - '!media/manifest.json'
      - 'generate_manifest.py'

permissions:
  contents: write

# Daca vin mai multe push-uri rapid, ruleaza doar ultimul.
concurrency:
  group: manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Genereaza manifest
        run: python generate_manifest.py

      - name: Comite manifest daca s-a schimbat
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/manifest.json
          if git diff --cached --quiet; then
            echo "Manifest neschimbat — nimic de comis."
          else
            git commit -m "Auto: actualizare media/manifest.json [skip ci]"
            git push
          fi
